<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שף שי 2.0</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🤖 שף שי השף של עומרי 👨‍🍳</h1>

    <p>אני אמצא לך מתכון טעים!</p>

    <button id="recipeButton">
        🍲 מתחילים
    </button>

    <div id="ingredients" style="display:none; margin-top:30px;">

        <h2>מה יש בבית?</h2>

        <label><input type="checkbox" value="ביצים"> 🥚 ביצים</label><br><br>

        <label><input type="checkbox" value="גבינה"> 🧀 גבינה</label><br><br>

        <label><input type="checkbox" value="פסטה"> 🍝 פסטה</label><br><br>

        <label><input type="checkbox" value="לחם"> 🍞 לחם</label><br><br>

        <label><input type="checkbox" value="שוקולד"> 🍫 שוקולד</label><br><br>

        <label><input type="checkbox" value="בננה"> 🍌 בננה</label><br><br>
<br><br>

<label><input type="checkbox" value="תפוח"> 🍎 תפוח</label>
<br><br>

<label><input type="checkbox" value="עגבנייה"> 🍅 עגבנייה</label>
<br><br>

<label><input type="checkbox" value="מלפפון"> 🥒 מלפפון</label>
<br><br>

<label><input type="checkbox" value="חלב"> 🥛 חלב</label>
<br><br>

<label><input type="checkbox" value="דבש"> 🍯 דבש</label>
<br><br>

<label><input type="checkbox" value="תירס"> 🌽 תירס</label>
<br><br>

<label><input type="checkbox" value="תפוח אדמה"> 🥔 תפוח אדמה</label>
<br><br>

<label><input type="checkbox" value="עוף"> 🍗 עוף</label>

        <hr>

        <h2>מה בא לך?</h2>

        <label>
            <input type="radio" name="type" value="מתוק">
            🍫 מתוק
        </label>

        <br><br>

        <label>
            <input type="radio" name="type" value="מלוח">
            🧂 מלוח
        </label>

        <hr>

        <h2>כמה זמן יש לך?</h2>

        <select id="time">
            <option value="5">5 דקות</option>
            <option value="10">10 דקות</option>
            <option value="20">20 דקות</option>
            <option value="30">30 דקות+</option>
        </select>

        <hr>

        <h2>איך מכינים?</h2>

        <select id="method">
            <option value="גז">🔥 גז</option>
            <option value="תנור">🔥 תנור</option>
            <option value="מיקרוגל">⚡ מיקרוגל</option>
            <option value="בלי בישול">🥗 בלי בישול</option>
        </select>

        <br><br>

      
<button id="findRecipe">
    🔍 מצא לי מתכון
</button>

<button id="surpriseRecipe">
    🎲 הפתע אותי
</button>

<button id="resetApp">
    🔄 התחל מחדש
</button>

        <div id="recipeResult"></div>

    </div>

</div>

<script src="recipes.js"></script>
<script src="script.js"></script>

</body>
</html>
